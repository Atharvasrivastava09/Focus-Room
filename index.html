<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../Focus-Room/assets/style.css">
  <title>Focus_Room</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar px-4">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold text-info" href="index.html">
      FOCUS ROOM
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

      <div class="collapse navbar-collapse justify-content-center" id="navMenu">
      <ul class="navbar-nav gap-5">

        <li class="nav-item">
          <a class="nav-link active-link" href="index.html">Timer</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="assets/sounds.html">Sounds</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="assets/tasks.html">Tasks</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="assets/stats.html">Stats</a>
        </li>

      </ul>
    </div>

    <div class="profile-icon ms-md-5">
      <i class="bi bi-person-circle"></i>
    </div>

  </div>
</nav>


<div class="container">
<main class="d-flex flex-column align-items-center justify-content-center min-vh-75">
    <div class="timer-container d-flex align-items-center justify-content-center position-relative">
        <svg class="progress-ring" width="300" height="300">
            <circle class="progress-ring-background" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="transparent" r="140" cx="150" cy="150"/>
            <circle class="progress-ring-circle" stroke="#22d3ee" stroke-width="8" stroke-linecap="round" fill="transparent" r="140" cx="150" cy="150"/>
        </svg>
        
        <div class="timer-display position-absolute text-center">
            <h1 id="timer-countdown" class="display-1 fw-bold mb-0">25:00</h1>
            <p id="timer-label" class="text-uppercase tracking-widest text-muted">Focus</p>
        </div>
    </div>

    <div class="controls mt-5 d-flex gap-3">
        <button id="start-btn" class="btn btn-outline-cyan btn-lg px-5">START</button>
        <button id="reset-btn" class="btn btn-outline-cyan btn-lg px-5">RESET</button>
    </div>
  <!-- Mode Selector -->
  <div class="mt-3">
    <select class="form-select w-auto mx-auto btn btn-outline-cyan" id="timer-mode">
      <option value="Pomodoro">Pomodoro</option>
      <option value="Short Break">Short Break</option>
      <option value="Long Break">Long Break</option>
    </select>
  </div>
</main>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/timer.js"></script>
</body>
</html>
