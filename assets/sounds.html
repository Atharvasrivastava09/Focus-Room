<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <title>Focus_Room</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar px-4">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold text-info" href="index.html">
      FOCUS ROOM
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-center" id="navMenu">
      <ul class="navbar-nav gap-4">

        <li class="nav-item">
          <a class="nav-link" href="index.html">Timer</a>

        <li class="nav-item">
          <a class="nav-link active-link" href="sounds.html">Sounds</a>

        <li class="nav-item">

    </div>

<main class="sound-main">
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold text-white">Soundscape Mixer</h1>
        <p class="text-info">Mix and match sounds to create your perfect focus environment.</p>
    </div>

    <div class="row g-4 justify-content-center">
        
        <!-- CARD TEMPLATE START -->
        <div class="col-6 col-md-4 col-lg-2-4">
            <div class="card sound-card" data-sound="soft-ambience">
                <div class="card-body">
                    <i class="bi bi-wind icon-display"></i>
                    <h5 class="card-title">Ambience</h5>

                    <div class="d-flex align-items-center gap-2">
                        <input type="range" class="form-range volume-slider flex-grow-1" min="0" max="1" step="0.1" value="0.5">
                        <i class="bi bi-volume-up-fill mute-toggle fs-5"></i>
                    </div>

                    <div class="d-flex justify-content-center gap-2 mt-2">
                        <button class="btn btn-success btn-sm play-btn">
                            <i class="bi bi-play-fill"></i>
                        </button>
                        <button class="btn btn-sm pause-btn">
                            <i class="bi bi-pause-fill"></i>
                        </button>
                    </div>

                    <div class="status-indicator">
                        <span class="dot"></span> <small class="status-text">OFF</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-4 col-lg-2-4">
            <div class="card sound-card" data-sound="lo-fi">
                <div class="card-body">
                    <i class="bi bi-headphones icon-display"></i>
                    <h5 class="card-title">Lo-Fi</h5>

                    <div class="d-flex align-items-center gap-2">
                        <input type="range" class="form-range volume-slider flex-grow-1" min="0" max="1" step="0.1" value="0.5">
                        <i class="bi bi-volume-up-fill mute-toggle fs-5"></i>
                    </div>

                    <div class="d-flex justify-content-center gap-2 mt-2">
                        <button class="btn btn-success btn-sm play-btn">
                            <i class="bi bi-play-fill"></i>
                        </button>
                        <button class="btn btn-sm pause-btn">
                            <i class="bi bi-pause-fill"></i>
                        </button>
                    </div>

                    <div class="status-indicator">
                        <span class="dot"></span> <small class="status-text">OFF</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-4 col-lg-2-4">
            <div class="card sound-card" data-sound="piano">
                <div class="card-body">
                    <i class="bi bi-music-note-beamed icon-display"></i>
                    <h5 class="card-title">Piano</h5>

                    <div class="d-flex align-items-center gap-2">
                        <input type="range" class="form-range volume-slider flex-grow-1" min="0" max="1" step="0.1" value="0.5">
                        <i class="bi bi-volume-up-fill mute-toggle fs-5"></i>
                    </div>

                    <div class="d-flex justify-content-center gap-2 mt-2">
                        <button class="btn btn-success btn-sm play-btn">
                            <i class="bi bi-play-fill"></i>
                        </button>
                        <button class="btn btn-sm pause-btn">
                            <i class="bi bi-pause-fill"></i>
                        </button>
                    </div>

                    <div class="status-indicator">
                        <span class="dot"></span> <small class="status-text">OFF</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-4 col-lg-2-4">
            <div class="card sound-card" data-sound="rain">
                <div class="card-body">
                    <i class="bi bi-cloud-rain icon-display"></i>
                    <h5 class="card-title">Rain</h5>

                    <div class="d-flex align-items-center gap-2">
                        <input type="range" class="form-range volume-slider flex-grow-1" min="0" max="1" step="0.1" value="0.5">
                        <i class="bi bi-volume-up-fill mute-toggle fs-5"></i>
                    </div>

                    <div class="d-flex justify-content-center gap-2 mt-2">
                        <button class="btn btn-success btn-sm play-btn">
                            <i class="bi bi-play-fill"></i>
                        </button>
                        <button class="btn btn-sm pause-btn">
                            <i class="bi bi-pause-fill"></i>
                        </button>
                    </div>

                    <div class="status-indicator">
                        <span class="dot"></span> <small class="status-text">OFF</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-4 col-lg-2-4">
            <div class="card sound-card" data-sound="cafe">
                <div class="card-body">
                    <i class="bi bi-cup-hot icon-display"></i>
                    <h5 class="card-title">Cafe</h5>

                    <div class="d-flex align-items-center gap-2">
                        <input type="range" class="form-range volume-slider flex-grow-1" min="0" max="1" step="0.1" value="0.5">
                        <i class="bi bi-volume-up-fill mute-toggle fs-5"></i>
                    </div>

                    <div class="d-flex justify-content-center gap-2 mt-2">
                        <button class="btn btn-success btn-sm play-btn">
                            <i class="bi bi-play-fill"></i>
                        </button>
                        <button class="btn btn-sm pause-btn">
                            <i class="bi bi-pause-fill"></i>
                        </button>
                    </div>

                    <div class="status-indicator">
                        <span class="dot"></span> <small class="status-text">OFF</small>
                    </div>
                </div>
            </div>
        </div>
        <!-- CARD TEMPLATE END -->

    </div>
</div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
