    <link rel="stylesheet" href="style.css">
    <title>Focus_Roomt</title>
</head>
<body>
    <nav class="navbar navbar-expand-lg custom-navbar px-4">
  <div class="container-fluid">

    <a class="navbar-brand fw-bold text-info" href="index.html">
      FOCUS ROOM
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-center" id="navMenu">
      <ul class="navbar-nav gap-5">

        <li class="nav-item">
          <a class="nav-link" href="index.html">Timer</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="sounds.html">Sounds</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="tasks.html">Tasks</a>
        </li>

        <li class="nav-item">
          <a class="nav-link active-link" href="stats.html">Stats</a>
        </li>

      </ul>
    </div>

    <div class="profile-icon ms-md-5">
      <i class="bi bi-person-circle"></i>
    </div>

  </div>
</nav>

<main class="container py-5">
    <div class="row g-4"> 
      <div class="col-md-7">
            
            <div class="card bg-dark border-info glow mb-4 text-center p-5">
                <div class="card-body">
                    <p class="text-uppercase tracking-widest text-light">Total Hours Focused</p>
                    <h1 class="display-1 fw-bold text-info" id="total-focus-hours">24.5</h1>
                    <div class="mt-3">
                        <span class="badge bg-secondary text-light">Next Goal: 50 HR</span>
                    </div>
                </div>
            </div>

            <div class="card bg-dark border-info glow">
                <div class="card-body">
                    <h5 class="card-title text-light mb-3">Weekly Progress</h5>
                    <canvas id="weeklyChart" style="max-height: 250px;"></canvas>
                </div>
            </div>

        </div> <div class="col-md-5">
            <div class="row g-4"> <div class="col-12">
                    <div class="card bg-dark border-info glow text-center">
                        <div class="card-body p-4">
                            <i class="bi bi-award text-info fs-1 mb-2"></i>
                            <h2 class="fw-bold text-light" id="total-sessions">21</h2>
                            <p class="text-uppercase tracking-widest text-light mb-0">Sessions Completed</p>
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="card bg-dark border-info glow text-center">
                        <div class="card-body p-4">
                            <p class="text-uppercase tracking-widest text-light">Daily Goal Progress</p>
                            <h2 class="fw-bold text-light" id="daily-goal">4 / 5</h2>
                            <div class="progress mt-3 bg-secondary" style="height: 10px;">
                                <div class="progress-bar bg-info" style="width: 80%"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="card bg-dark border-info glow text-center">
                        <div class="card-body p-4">
                            <i class="bi bi-star-fill text-info fs-1 mb-2"></i>
                            <h2 class="fw-bold text-light">Level 3</h2>
                            <p class="text-uppercase tracking-widest text-muted mb-0">Work Practitioner</p>
                        </div>
                    </div>
                </div>

                <div class="card bg-dark border-info glow">
                  <div class="card-body">
                    <h5 class="card-title text-light mb-3">Focus Distribution</h5>
                      <div style="height: 250px;">
                          <canvas id="distributionChart"></canvas>
                      </div>
                 </div>
              </div>

                </div>
          </div>
      </div>
  </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
